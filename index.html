<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欢迎进入中国东北介绍</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Microsoft YaHei", sans-serif;
}

.start-box {
  text-align: center;
  background: white;
  padding: 60px 80px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

.start-box h1 {
  font-size: 36px;
  margin-bottom: 15px;
  color: #222;
}

.start-box p {
  font-size: 16px;
  color: #666;
  margin-bottom: 35px;
}

.start-btn {
  display: inline-block;
  padding: 14px 40px;
  background: #4472c4;
  color: white;
  font-size: 18px;
  border-radius: 6px;
  text-decoration: none;
  transition: 0.3s;
}

.start-btn:hover {
  background: #335999;
}
</style>
</head>

<body>

<div class="start-box">
  <h1>中国东北介绍</h1>
  <p>欢迎浏览东北地理、气候、美食与发展现状</p>
  <a href="northeast_china_title.html" class="start-btn">点击进入</a>
</div>

</body>
</html>
